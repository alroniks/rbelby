<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: Primary Blue -->
  <circle cx="16" cy="16" r="16" fill="#054EA4" />

  <!-- Content Group -->
  <g transform="translate(0, 2)">
    <!-- Drop Handlebars: White -->
    <g fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- Stem -->
      <line x1="16" y1="4" x2="16" y2="9" />
      <!-- Top bar -->
      <line x1="9" y1="9" x2="23" y2="9" />
      <!-- Left Drop -->
      <path d="M 9 9 A 5 5 0 0 0 4 14 A 4 4 0 0 0 8 18" />
      <!-- Right Drop -->
      <path d="M 23 9 A 5 5 0 0 1 28 14 A 4 4 0 0 1 24 18" />
    </g>

    <!-- Letters RB: Secondary Yellow -->
    <text x="16.5" y="27" font-family="system-ui, -apple-system, Impact, sans-serif" font-weight="900" font-size="11" fill="#FFD100" text-anchor="middle" letter-spacing="1">RB</text>
  </g>
</svg>
