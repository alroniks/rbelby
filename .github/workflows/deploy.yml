name: Deploy to Cloudflare Pages

on:
  release:
    types: [published]
  push:
    branches:
      - 'changeset-release/main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'rbelby' # Update this if your Cloudflare project name is different
          directory: 'dist'
          # If it's a published release, we deploy to production.
          # Otherwise, we deploy as a preview branch (like changeset-release/main).
          branch: ${{ github.event_name == 'release' && 'main' || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
