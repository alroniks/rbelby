name: Auto-generate Changeset

on:
  pull_request:
    types: [closed]

jobs:
  generate:
    # Only run if the PR was actually merged, AND it is NOT the automated Release PR merging.
    if: github.event.pull_request.merged == true && !startsWith(github.event.pull_request.head.ref, 'changeset-release/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Determine Bump Type
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          BUMP="patch"
          if [[ "$LABELS" == *"major"* ]]; then
            BUMP="major"
          elif [[ "$LABELS" == *"minor"* || "$LABELS" == *"enhancement"* || "$LABELS" == *"feature"* ]]; then
            BUMP="minor"
          fi
          echo "type=$BUMP" >> $GITHUB_OUTPUT

      - name: Create Changeset File
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
          TYPE: ${{ steps.bump.outputs.type }}
        run: |
          cat <<EOF > ".changeset/pr-${PR_NUM}.md"
          ---
          "rbelby": ${TYPE}
          ---

          **${TITLE}**

          ${BODY}
          EOF

      - name: Commit and Push Changeset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset/
          git commit -m "chore: auto-generate changeset for PR #${{ github.event.pull_request.number }}"
          git push

      - name: Trigger Release Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml || echo "Release workflow not found or failed to trigger."
